<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | Westville Old Boys Football Club</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        .schedule-section {
            padding: 80px 5%;
            background: linear-gradient(to right, #0022ff 0%, #0022ff 50%, #ee0000 50%, #ee0000 100%);
            min-height: 100vh;
        }

        .schedule-section h2 {
            text-align: center;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .schedule-section .subtitle {
            text-align: center;
            color: #fff;
            font-style: italic;
            margin-bottom: 30px;
        }

        .team-filter {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .team-filter select,
        .team-filter input {
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
        }

        .team-filter input {
            width: 280px;
        }

        .export-btn {
        background: linear-gradient(135deg, #2563eb, #1e3a8a); /* blue gradient */
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.5px;

        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);

        transition: all 0.25s ease;
        }

        .export-btn:hover {
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.6);
        }

        .export-btn:active {
         transform: scale(0.97);
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .schedule-table th, .schedule-table td {
            padding: 15px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .schedule-table th {
            background: #2de2e2;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .schedule-table tr:hover {
            background: #f9f9f9;
        }

        .wob-match {
            background: #e6fff9;
            font-weight: 700;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="images/LOGO.jpg" alt="Logo" class="logo-image">
            <span class="logo-text">Westville Old Boys Football Club</span>
        </a>
    </div>
    <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="Training.html">TRAINING</a></li> 
        <li><a href="Schedule.html">SCHEDULE</a></li>
        <li><a href="Teams.html">TEAMS</a></li>
        <li><a href="coaches.html">COACHES</a></li>
        <li><a href="Gallery.html">GALLERY</a></li>
        <li><a href="Contact.html">CONTACT US</a></li>
        <li><a href="About.html">ABOUT US</a></li>  
    </ul>
</nav>

<section class="schedule-section">

    <h2>U6.1 Fixtures</h2>
    <p class="subtitle">2026 GDLFA Junior League Schedule</p>

    <div class="team-filter">
        <input type="text" id="searchBar" placeholder="Search by team, venue, or date...">
        
        <select id="teamFilter">
            <option value="all">All Matches</option>
            <option value="wob">WOB Matches Only</option>
        </select>

        <!--EXPORT BUTTON -->
        <button class="export-btn" onclick="exportCSV()">Export to CSV</button>
    </div>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Home Team</th>
                <th></th>
                <th>Away Team</th>
                <th>Venue</th>
                <th>Time</th>
                <th>Field</th>
            </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
    </table>

</section>

<footer class="main-footer">
    <div class="footer-content">
        <p class="footer-club-name">WESTVILLE OLD BOYS FOOTBALL CLUB</p>
    </div>
</footer>

<script>
let fixturesData = [];

fetch("fixtures.json")
.then(res => res.json())
.then(data => {
    fixturesData = data;
    renderTable();
});

function renderTable() {
    const tbody = document.getElementById("scheduleBody");
    const filter = document.getElementById("teamFilter").value;
    const search = document.getElementById("searchBar").value.toLowerCase();

    tbody.innerHTML = "";

    fixturesData.forEach(match => {
        const isWOB = match.home.includes("WOB") || match.away.includes("WOB");

        if (filter === "wob" && !isWOB) return;

        const matchText = `${match.date} ${match.home} ${match.away} ${match.venue}`.toLowerCase();
        if (search && !matchText.includes(search)) return;

        const row = document.createElement("tr");

        if (isWOB) row.classList.add("wob-match");

        row.innerHTML = `
            <td>${match.date}</td>
            <td>${match.home}</td>
            <td>VS</td>
            <td>${match.away}</td>
            <td>${match.venue}</td>
            <td>${match.time}</td>
            <td>${match.field}</td>
        `;

        tbody.appendChild(row);
    });
}

/*CSV EXPORT FUNCTION */
function exportCSV() {
    let csv = "Date;Home Team;Away Team;Venue;Time;Field\n";

    fixturesData.forEach(match => {
        csv += `${match.date};${match.home};${match.away};${match.venue};${match.time};${match.field}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "fixtures.csv";
    link.click();
}

document.getElementById("teamFilter").addEventListener("change", renderTable);
document.getElementById("searchBar").addEventListener("input", renderTable);
</script>

</body>
</html>
